services:
  - type: web
    name: kmapp
    env: docker
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Xmx400m --enable-native-access=ALL-UNNAMED -Dorg.sqlite.tmpdir=/tmp -jar target/kimia-webapp-0.1.0.jar
    healthCheckPath: /
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: KIMIA_DB_PATH
        value: /tmp/kimia_data_normalizzato.db
