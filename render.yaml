services:
  - type: web
    name: kmapp
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Xmx400m -jar target/kimia-webapp-0.1.0.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: KIMIA_DB_PATH
        value: /tmp/kimia_data_normalizzato.db
