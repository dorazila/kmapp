<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Carrello</title><link rel="stylesheet" href="/css/app.css"></head><body><div th:replace="~{_nav :: nav}"></div>
<main class="container"><div class="card"><h1>Carrello</h1><p class="total">Totale prodotti: â‚¬ <span th:text="${#numbers.formatDecimal(total,1,'POINT',2,'COMMA')}"></span></p><form action="/carrello/clear" method="post"><button class="secondary">Svuota carrello</button></form></div>
<div class="card"><table><thead><tr><th>Prodotto</th><th>UM</th><th class="right">Netto</th><th>QtÃ </th><th>Sconto %</th><th class="right">Totale</th><th></th></tr></thead><tbody>
<tr th:each="i:${items}"><td><strong th:text="${i.product_name}"></strong><div class="muted" th:text="${i.product_code}"></div></td><td th:text="${i.unit_measure}"></td><td class="right" th:text="${#numbers.formatDecimal(i.effectivePrice,1,'POINT',2,'COMMA')}"></td><td colspan="2"><form action="/carrello/update" method="post" class="grid"><input type="hidden" name="key" th:value="${cart.key(i)}"><input name="qty" th:value="${i.qty}"><input name="sconto" th:value="${i.sconto == null ? '' : i.sconto * 100}"><button>Aggiorna</button></form></td><td class="right" th:text="${i.rowTotal == null ? '-' : #numbers.formatDecimal(i.rowTotal,1,'POINT',2,'COMMA')}"></td><td><form action="/carrello/remove" method="post"><input type="hidden" name="key" th:value="${cart.key(i)}"><button class="danger">Elimina</button></form></td></tr>
</tbody></table></div><a class="btn" href="/offerta">Vai all'offerta</a></main></body></html>
