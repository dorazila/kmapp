<!doctype html><html lang="it"><head><meta charset="utf-8"><title>Listino</title><link rel="stylesheet" href="/css/app.css"></head><body><div th:replace="~{_nav :: nav}"></div>
<main class="container">
  <div class="card"><h1>Listino prodotti</h1>
    <form method="get" class="grid3">
      <div><label>Categoria</label><select name="category"><option th:each="c:${categories}" th:value="${c}" th:text="${c}" th:selected="${c==selectedCategory}"></option></select></div>
      <div><label>Tipo listino</label><select name="listinoType"><option value="" th:selected="${selectedListinoType == null or selectedListinoType == ''}">Tutti</option><option value="STA" th:selected="${selectedListinoType == 'STA'}">STA - Standard</option><option value="FST" th:selected="${selectedListinoType == 'FST'}">FST - Fuori standard</option><option value="NLIS" th:selected="${selectedListinoType == 'NLIS'}">NLIS - Non a listino</option></select></div>
      <div><label>Cerca</label><input name="q" th:value="${q}" placeholder="nome, codice o descrizione"></div>
      <div style="align-self:end"><button type="submit">Filtra</button> <a class="btn secondary" href="/catalogo">Pulisci</a></div>
    </form>
    <p class="muted">Prodotti trovati: <span th:text="${#lists.size(products)}"></span> · Nel carrello: <span th:text="${cartCount}"></span></p>
  </div>
  <div class="card">
    <table><thead><tr><th>Codice</th><th>Tipo</th><th>Prodotto</th><th>Categoria</th><th>UM</th><th class="right">Netto</th><th class="right">Listino</th><th></th></tr></thead>
      <tbody><tr th:each="p:${products}" th:classappend="${selectedCodes != null and selectedCodes.contains(p.productCode)} ? 'row-added' : ''">
        <td th:text="${p.productCode}"></td><td><span class="listino-badge" th:classappend="${'listino-' + p.listinoType}" th:text="${p.listinoType}" th:title="${p.listinoType == 'STA' ? 'Standard' : (p.listinoType == 'FST' ? 'Fuori standard' : 'Non a listino')}"></span></td><td><strong th:text="${p.productName}"></strong><div class="muted" th:text="${p.description}"></div></td><td th:text="${p.categoryName}"></td><td th:text="${p.unitMeasure}"></td><td class="right" th:text="${#numbers.formatDecimal(p.netPrice,1,'POINT',2,'COMMA')}"></td><td class="right" th:text="${#numbers.formatDecimal(p.listinoPrice,1,'POINT',2,'COMMA')}"></td>
        <td><form th:action="@{/catalogo/add/{code}(code=${p.productCode})}" method="post"><input type="hidden" name="category" th:value="${selectedCategory}"><input type="hidden" name="listinoType" th:value="${selectedListinoType}"><input type="hidden" name="q" th:value="${q}"><button type="submit">Aggiungi</button></form></td>
      </tr></tbody></table>
  </div>
</main></body></html>
